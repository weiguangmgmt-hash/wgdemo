<title>唯光動物醫院 · 營運儀表板</title>
<style>
:root{
  --gold:#C2A878; --gold2:#D8C4A0; --gold3:#B8A589; --gold4:#A88C5F;
  --ink:#4A4036; --muted:#9A8E7C; --bg:#FAF7F2; --card:#FFFFFF;
  --line:#ECE4D7; --shadow:0 6px 24px rgba(140,120,90,.10);
  --pos:#8FA98C; --neg:#C98F8F;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","PingFang TC","Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
.serif{font-family:"Cormorant Garamond","Times New Roman",Georgia,serif}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
header{padding:34px 0 18px;text-align:center;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,var(--bg))}
.logo-mark{margin:0 auto 6px}
.brand-en{font-family:"Cormorant Garamond",Georgia,serif;font-size:34px;letter-spacing:10px;color:var(--gold4);font-weight:600;margin-left:10px}
.brand-sub{font-family:"Cormorant Garamond",Georgia,serif;font-style:italic;font-size:18px;color:var(--gold);letter-spacing:2px;margin-top:-2px}
.brand-zh{font-size:15px;letter-spacing:9px;color:var(--muted);margin-top:8px}
.dash-title{margin-top:14px;font-size:13px;letter-spacing:3px;color:var(--muted)}
nav{display:flex;justify-content:center;gap:6px;margin:22px 0 26px;flex-wrap:wrap}
.tab{padding:10px 26px;border:1px solid var(--line);background:#fff;border-radius:999px;cursor:pointer;font-size:14px;color:var(--muted);letter-spacing:2px;transition:.2s}
.tab:hover{border-color:var(--gold)}
.tab.active{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:var(--shadow)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow)}
.kpi .lab{font-size:12px;color:var(--muted);letter-spacing:1px}
.kpi .val{font-size:28px;font-weight:700;margin-top:8px;color:var(--ink);font-family:"Cormorant Garamond",Georgia,serif;letter-spacing:.5px}
.kpi .val small{font-size:14px;color:var(--gold4);font-family:inherit}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi.hl{background:linear-gradient(135deg,var(--gold),var(--gold4));border:none}
.kpi.hl .lab,.kpi.hl .sub{color:rgba(255,255,255,.85)}
.kpi.hl .val{color:#fff}
.ai-btn{margin-top:14px;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;letter-spacing:1px;
  padding:6px 13px;border-radius:999px;cursor:pointer;border:1px solid var(--gold);
  background:rgba(194,168,120,.10);color:var(--gold4);transition:.18s}
.ai-btn:hover{background:var(--gold);color:#fff}
.kpi.hl .ai-btn{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.18);color:#fff}
.kpi.hl .ai-btn:hover{background:#fff;color:var(--gold4)}
.ai-btn .sp{font-size:13px;line-height:1}
.grid{display:grid;gap:18px;margin-bottom:18px}
.g2{grid-template-columns:1.55fr 1fr}.g11{grid-template-columns:1fr 1fr}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow)}
.panel h3{font-size:14px;font-weight:600;letter-spacing:1px;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.panel h3::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--gold);display:inline-block;transform:rotate(45deg)}
.panel .note{font-size:11px;color:var(--muted);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 6px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:500;font-size:11px;letter-spacing:1px}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#FBF8F2}
.rank{display:inline-flex;width:20px;height:20px;border-radius:6px;background:#F2EBDD;color:var(--gold4);font-size:11px;align-items:center;justify-content:center;font-weight:700;margin-right:8px}
.bar-cell{position:relative}
.bar-cell .fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(194,168,120,.22),rgba(194,168,120,.05));border-radius:4px;z-index:0}
.bar-cell span{position:relative;z-index:1}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;font-size:12px;color:var(--muted)}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:middle}
footer{text-align:center;color:var(--muted);font-size:11px;padding:30px 0 40px;letter-spacing:1px}
svg text{font-family:inherit}
/* ---- AI 洞見 Modal ---- */
.overlay{position:fixed;inset:0;background:rgba(74,64,54,.42);backdrop-filter:blur(3px);
  display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 18px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--card);max-width:620px;width:100%;border-radius:20px;box-shadow:0 30px 80px rgba(74,64,54,.3);
  overflow:hidden;animation:pop .22s ease}
@keyframes pop{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.m-head{background:linear-gradient(135deg,var(--gold),var(--gold4));color:#fff;padding:22px 26px;position:relative}
.m-head .ey{font-size:11px;letter-spacing:3px;opacity:.85}
.m-head .ti{font-size:21px;font-weight:700;margin-top:4px;font-family:"Cormorant Garamond",Georgia,serif;letter-spacing:.5px}
.m-head .mv{font-size:13px;opacity:.92;margin-top:6px}
.m-close{position:absolute;top:16px;right:18px;width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.22);color:#fff;font-size:17px;line-height:1}
.m-close:hover{background:rgba(255,255,255,.4)}
.m-body{padding:20px 26px 26px}
.sec{margin-bottom:18px}
.sec:last-child{margin-bottom:0}
.sec .h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--gold4);letter-spacing:1px;margin-bottom:8px}
.sec .h .ic{width:22px;height:22px;border-radius:7px;background:#F2EBDD;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.sec p{font-size:13.5px;color:var(--ink);line-height:1.75}
.sec ul{margin:0;padding-left:2px;list-style:none}
.sec li{font-size:13.5px;color:var(--ink);line-height:1.7;padding-left:22px;position:relative;margin-bottom:7px}
.sec li::before{content:"▸";position:absolute;left:4px;color:var(--gold);font-size:12px;top:1px}
.m-foot{border-top:1px solid var(--line);padding:12px 26px;font-size:10.5px;color:var(--muted);letter-spacing:.5px;background:#FCFAF6}
@media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr)}.g2,.g11{grid-template-columns:1fr}}
</style>
</head>

const PAL=['#C2A878','#D8C4A0','#A88C5F','#CBB892','#B8A589','#9C8763','#E0D2B8','#8C7458'];
const fmt=n=>Math.round(n).toLocaleString('en-US');
function money(n){const a=Math.abs(n);if(a>=1e8)return(n/1e8).toFixed(2)+' 億';if(a>=1e4)return(n/1e4).toFixed(0)+' 萬';return fmt(n);}
const mlabel=ym=>ym.slice(0,4)+'/'+ym.slice(4,6);

function lineChart(series,opts={}){
  const W=opts.w||720,H=opts.h||260,P={l:54,r:16,t:18,b:34};
  const xs=series[0].data.map(d=>d.x);const allY=series.flatMap(s=>s.data.map(d=>d.y));
  const maxY=Math.max(...allY,1),niceMax=maxY*1.1;
  const px=i=>P.l+(W-P.l-P.r)*(xs.length<2?0.5:i/(xs.length-1));
  const py=v=>H-P.b-(H-P.t-P.b)*(v/niceMax);let g='';
  for(let k=0;k<=4;k++){const v=niceMax*k/4,y=py(v);
    g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#EFE8DB"/>`;
    g+=`<text x="${P.l-8}" y="${y+4}" text-anchor="end" font-size="10" fill="#B0A48F">${money(v)}</text>`;}
  const step=Math.ceil(xs.length/8);
  xs.forEach((x,i)=>{if(i%step===0||i===xs.length-1)g+=`<text x="${px(i)}" y="${H-12}" text-anchor="middle" font-size="9.5" fill="#B0A48F">${mlabel(x)}</text>`;});
  series.forEach(s=>{let d=s.data.map((p,i)=>(i?'L':'M')+px(i)+' '+py(p.y)).join(' ');
    if(opts.area)g+=`<path d="${d} L ${px(s.data.length-1)} ${py(0)} L ${px(0)} ${py(0)} Z" fill="${s.color}" opacity="0.10"/>`;
    g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round"/>`;
    s.data.forEach((p,i)=>{g+=`<circle cx="${px(i)}" cy="${py(p.y)}" r="2.6" fill="#fff" stroke="${s.color}" stroke-width="1.8"><title>${mlabel(p.x)}：${fmt(p.y)}</title></circle>`;});});
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}
function donut(parts){const W=230,H=230,cx=115,cy=115,r=78,ir=48;
  const tot=parts.reduce((a,p)=>a+p.value,0)||1;let ang=-Math.PI/2,g='';
  parts.forEach((p,i)=>{const a2=ang+2*Math.PI*p.value/tot;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ir*Math.cos(a2),yi1=cy+ir*Math.sin(a2),xi2=cx+ir*Math.cos(ang),yi2=cy+ir*Math.sin(ang);
    const lg=(a2-ang)>Math.PI?1:0;
    g+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2} L${xi1} ${yi1} A${ir} ${ir} 0 ${lg} 0 ${xi2} ${yi2} Z" fill="${PAL[i%PAL.length]}"><title>${p.name}：${money(p.value)}（${(p.value/tot*100).toFixed(1)}%）</title></path>`;ang=a2;});
  g+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="11" fill="#B0A48F">總額</text>`;
  g+=`<text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="15" font-weight="700" fill="#7A6A52">${money(tot)}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:240px;margin:0 auto;display:block">${g}</svg>`;
}
function rankTable(rows,cols,maxKey){const max=Math.max(...rows.map(r=>r[maxKey]),1);
  let h=`<table><thead><tr>${cols.map(c=>`<th class="${c.num?'num':''}">${c.t}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach((r,i)=>{h+='<tr>';cols.forEach(c=>{let v=r[c.k];
    if(c.k==='__rank')v=`<span class="rank">${i+1}</span>`+(r.__label||'');else if(c.money)v=fmt(v);
    if(c.bar){const w=(r[maxKey]/max*100).toFixed(1);h+=`<td class="num bar-cell"><div class="fill" style="width:${w}%"></div><span>${v}</span></td>`;}
    else h+=`<td class="${c.num?'num':''}">${v}</td>`;});h+='</tr>';});
  return h+'</tbody></table>';}
function legend(parts){return `<div class="legend">${parts.map((p,i)=>`<span><i style="background:${PAL[i%PAL.length]}"></i>${p.name}（${money(p.value)}）</span>`).join('')}</div>`;}
function kpi(lab,val,sub,hl,ins){

  return `<div class="kpi ${hl?'hl':''}"><div class="lab">${lab}</div><div class="val">${val}</div><div class="sub">${sub||''}</div>${btn}</div>`;
}

  </div>`;
  h+=`<div class="grid g2">
    <div class="panel"><h3>各分類庫存金額</h3><div class="note">依品號分類彙總</div>
      ${donut(inv.by_category.map(c=>({name:c.cat,value:c.value})))}${legend(inv.by_category.map(c=>({name:c.cat,value:c.value})))}</div>
    <div class="panel"><h3>分類明細</h3>
      ${rankTable(inv.by_category.map(c=>({__label:c.cat,value:c.value,count:c.count})),[{k:'__rank',t:'分類'},{k:'count',t:'品項數',num:true},{k:'value',t:'庫存金額 NT$',num:true,money:true,bar:true}],'value')}</div>
  </div>`;
  h+=`<div class="panel"><h3>庫存金額前十大品項</h3>
    ${rankTable(inv.top_items.map(it=>({__label:it.name,cat:it.cat,qty:it.qty,value:it.value,pno:it.pno})),[{k:'__rank',t:'品名'},{k:'pno',t:'品號'},{k:'cat',t:'分類'},{k:'qty',t:'庫存量',num:true,money:true},{k:'value',t:'庫存金額 NT$',num:true,money:true,bar:true}],'value')}</div>`;return h;}
function vSales(){const s=DATA.sales;
  let h=`<div class="kpis">
    ${kpi('總營收','<small>NT$</small> '+money(s.kpi.revenue),'銷貨本幣金額',true,'revenue')}
    ${kpi('銷貨單數',fmt(s.kpi.docs),'張',false,'docs')}
    ${kpi('平均客單價','<small>NT$</small> '+money(s.kpi.avg_order),'每張銷貨單',false,'avg_order')}
    ${kpi('交易客戶數',fmt(s.kpi.customers),'家',false,'customers')}
  </div>`;
  h+=`<div class="panel" style="margin-bottom:18px"><h3>營收　月趨勢</h3><div class="note">每月銷貨金額（NT$）</div>
    ${lineChart([{name:'營收',color:'#C2A878',data:s.monthly.map(m=>({x:m.ym,y:m.amount}))}],{area:true,h:280})}</div>`;
  h+=`<div class="grid g11">
    <div class="panel"><h3>前十大客戶</h3>${rankTable(s.top_customers.map(c=>({__label:c.name,amount:c.amount})),[{k:'__rank',t:'客戶'},{k:'amount',t:'營收 NT$',num:true,money:true,bar:true}],'amount')}</div>
    <div class="panel"><h3>業務員業績</h3>${rankTable(s.by_sales.map(v=>({__label:'業務 '+v.emp,amount:v.amount})),[{k:'__rank',t:'業務員'},{k:'amount',t:'營收 NT$',num:true,money:true,bar:true}],'amount')}</div>
  </div>`;
  h+=`<div class="panel"><h3>暢銷商品（金額前十）</h3>
    ${rankTable(s.top_products.map(p=>({__label:p.name,pno:p.pno,qty:p.qty,amount:p.amount})),[{k:'__rank',t:'品名'},{k:'pno',t:'品號'},{k:'qty',t:'數量',num:true,money:true},{k:'amount',t:'銷售金額 NT$',num:true,money:true,bar:true}],'amount')}</div>`;return h;}

const VIEWS={overview:vOverview,finance:vFinance,inventory:vInventory,sales:vSales};
function render(tab){document.getElementById('app').innerHTML=VIEWS[tab]();}
document.getElementById('nav').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');render(t.dataset.tab);});

// ---- 洞見 Modal ----
const overlay=document.getElementById('overlay');
function openInsight(id,mv){const d=INSIGHTS[id];if(!d)return;
  document.getElementById('mTitle').textContent=d.t;
  document.getElementById('mValue').textContent=mv?('目前數值　'+mv):'';
  document.getElementById('mBody').innerHTML=
    `<div class="sec"><div class="h"><span class="ic">🔍</span>問題分析</div><p>${d.analysis}</p></div>`+
    `<div class="sec"><div class="h"><span class="ic">🧭</span>問題來源</div><p>${d.source}</p></div>`+
    `<div class="sec"><div class="h"><span class="ic">💡</span>建議對策</div><ul>${d.actions.map(a=>`<li>${a}</li>`).join('')}</ul></div>`;
  overlay.classList.add('show');}
function closeInsight(){overlay.classList.remove('show');}
document.body.addEventListener('click',e=>{const b=e.target.closest('.ai-btn');if(b){openInsight(b.dataset.ins,b.dataset.mv);}});
document.getElementById('mClose').addEventListener('click',closeInsight);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeInsight();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeInsight();});

render('overview');
</script>
</body>
</html>
